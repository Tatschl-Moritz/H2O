name: Wasserstand

on:
  schedule:
    # Alle 15 Minuten, unabhaengig vom Tour-Scraper - Pegel kann sich schneller
    # aendern als Anmeldezahlen, v.a. bei Regen/Schneeschmelze.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wasserstand
  cancel-in-progress: false

jobs:
  wasserstand:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Wasserstand abrufen
        run: npm run wasserstand

      - name: Daten committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/wasserstand.json public/data/wasserstand-history.json
          if git diff --cached --quiet; then
            echo "Keine Aenderungen."
          else
            git commit -m "Wasserstand: aktualisiert ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git pull --rebase origin main
            git push
          fi
